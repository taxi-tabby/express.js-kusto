name: tests
on:
  push:
    branches: [main, 'ver/**']
  pull_request:

jobs:
  test-sqlite:
    name: tests (sqlite default)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - name: Install dependencies
        run: npm ci
      - name: Generate Prisma client (사용자 schema, tsc 사전 에러 회피)
        run: npm run db -- generate -a
        continue-on-error: true
      - name: TypeScript check
        run: npx tsc --noEmit -p tsconfig.test.json
      - name: Run tests
        run: npm run test:ci
      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-sqlite
          path: coverage/
          retention-days: 7

  test-postgres:
    name: tests (postgres via pglite-socket)
    runs-on: ubuntu-latest
    needs: test-sqlite
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - name: Install dependencies
        run: npm ci
      - name: Generate Prisma client
        run: npm run db -- generate -a
        continue-on-error: true
      - name: Run tests with PostgreSQL backend
        run: npm run test:ci
        env:
          KUSTO_TEST_DB: postgres
